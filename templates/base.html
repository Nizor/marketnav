<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0A1628" />
  <title>{% block title %}MarketNav{% endblock %}</title>

  <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>

  <style>
    /* ── Design Tokens ─────────────────────────────────────────── */
    :root {
      --bg:         #0A1628;
      --bg2:        #0F1E38;
      --bg3:        #162442;
      --surface:    #1C2D4F;
      --border:     rgba(255,255,255,0.08);
      --accent:     #F5A623;
      --accent2:    #FF6B35;
      --green:      #2ECC71;
      --text:       #EDF2FF;
      --muted:      #7A8FA6;
      --radius:     16px;
      --radius-sm:  8px;
      --ff-display: 'Syne', sans-serif;
      --ff-body:    'DM Sans', sans-serif;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--ff-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ─────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Top nav ────────────────────────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,22,40,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .nav-brand {
      font-family: var(--ff-display);
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: -0.02em;
    }

    .nav-brand .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color var(--transition);
    }
    .nav-back:hover { color: var(--text); }
    .nav-back svg { width: 16px; height: 16px; }

    /* ── Main content ───────────────────────────────────────────── */
    main {
      flex: 1;
      position: relative;
      z-index: 1;
    }

    /* ── Page header ────────────────────────────────────────────── */
    .page-header {
      padding: 28px 20px 0;
    }
    .page-eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .page-title {
      font-family: var(--ff-display);
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    .page-subtitle {
      margin-top: 6px;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.5;
    }

    /* ── Cards ──────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-inset {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    /* ── Buttons ────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-family: var(--ff-body);
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #0A1628;
    }
    .btn-primary:hover {
      background: #f5b840;
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface); }

    .btn-full { width: 100%; }

    .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── Badge ──────────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.04em;
    }
    .badge-accent { background: rgba(245,166,35,0.15); color: var(--accent); }
    .badge-green  { background: rgba(46,204,113,0.15); color: var(--green); }
    .badge-muted  { background: var(--bg3); color: var(--muted); }

    /* ── Divider ────────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0;
    }

    /* ── Search bar ─────────────────────────────────────────────── */
    .search-wrap {
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px 12px 42px;
      color: var(--text);
      font-family: var(--ff-body);
      font-size: 0.95rem;
      outline: none;
      transition: border-color var(--transition);
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--accent); }

    /* ── Spinner ────────────────────────────────────────────────── */
    .htmx-indicator {
      display: none;
    }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.85rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Animations ─────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.4s ease both; }
    .delay-1 { animation-delay: 0.08s; }
    .delay-2 { animation-delay: 0.16s; }
    .delay-3 { animation-delay: 0.24s; }
    .delay-4 { animation-delay: 0.32s; }

    /* ── Toast ──────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      font-size: 0.875rem;
      color: var(--text);
      z-index: 999;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Utilities ──────────────────────────────────────────────── */
    .p-20  { padding: 20px; }
    .px-20 { padding-left: 20px; padding-right: 20px; }
    .py-20 { padding-top: 20px; padding-bottom: 20px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .mt-20 { margin-top: 20px; }
    .mt-24 { margin-top: 24px; }
    .gap-12 { gap: 12px; }
    .gap-16 { gap: 16px; }
    .flex   { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .text-muted { color: var(--muted); }
    .text-accent { color: var(--accent); }
    .text-sm { font-size: 0.85rem; }
    .text-xs { font-size: 0.75rem; }
    .font-display { font-family: var(--ff-display); }
    .fw-600 { font-weight: 600; }
    .fw-700 { font-weight: 700; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- Nav -->
  <nav class="nav">
    <a href="{% url 'landing' %}" class="nav-brand">
      <span class="dot"></span>MarketNav
    </a>
    {% block nav_right %}{% endblock %}
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
    function showToast(msg, duration = 3000) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), duration);
    }
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
